changelog:
  categories:
    - title: "New Skills"
      labels:
        - feat
    - title: "Bug Fixes & Improvements"
      labels:
        - fix
        - refactor
        - perf
    - title: "Documentation"
      labels:
        - docs
    - title: "CI / Infrastructure"
      labels:
        - ci
        - build
    - title: "Maintenance"
      labels:
        - chore
        - style
        - test
    - title: "Other Changes"
      labels:
        - "*"
